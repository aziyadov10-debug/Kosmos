<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Kosmos Səyahəti</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020208;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Glassmorphism Qeydiyyat Paneli */
        .login-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            width: 85%;
            max-width: 360px;
            padding: 35px 25px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-container.hide {
            opacity: 0;
            visibility: hidden;
            transform: translate(-50%, -80%) scale(0.8);
        }

        .login-container h2 {
            color: #fff;
            margin-bottom: 30px;
            font-weight: 400;
            letter-spacing: 1px;
            font-size: 1.5rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            outline: none;
            color: #fff;
            font-size: 15px;
            transition: 0.3s;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #ffffff;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #0055ff, #7f00ff);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(127, 0, 255, 0.3);
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://ia801602.us.archive.org/11/items/hans-zimmer-cornfield-chase/Hans%20Zimmer%20-%20Cornfield%20Chase.mp3" type="audio/mpeg">
    </audio>

    <div id="canvas-container"></div>

    <div class="login-container" id="loginBox">
        <h2>Kainata Giriş</h2>
        <form id="loginForm" onsubmit="startUniverse(event)">
            <div class="input-group">
                <input type="text" placeholder="Adınız" required>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Giriş Kodu" required>
            </div>
            <button type="submit" class="submit-btn">Kainatı Başlat</button>
        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, stars, planets = [];
        let isActivated = false;
        let transitionProgress = 0; 
        let mouseX = 0, mouseY = 0;
        const textureLoader = new THREE.TextureLoader();

        function init() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 45;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // Güclü kosmik işıqlandırma (Planetlərin detallarının görünməsi üçün)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 1.8);
            sunLight.position.set(10, 10, 20);
            scene.add(sunLight);

            // Ulduzlar fonu
            const starGeo = new THREE.BufferGeometry();
            const starCount = 4500;
            const starPositions = new Float32Array(starCount * 3);

            for(let i=0; i < starCount * 3; i++) {
                starPositions[i] = (Math.random() - 0.5) * 600;
            }

            starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.35 });
            stars = new THREE.Points(starGeo, starMaterial);
            scene.add(stars);

            // REAL PLANET TEKSTURALARI (Kosmik şəkillər birbaşa internetdən yüklənir)
            const planetData = [
                { size: 0.8, texture: 'https://i.imgur.com/bNu6v81.jpg', dist: 12, speed: 0.012 }, // Merkuri / Mars tipli
                { size: 1.4, texture: 'https://i.imgur.com/YiYvX2w.jpg', dist: 18, speed: 0.009 }, // Yer Kürəsi real xəritəsi
                { size: 1.1, texture: 'https://i.imgur.com/u74YV3G.jpg', dist: 25, speed: 0.007 }, // Buludlu / Neptun tipli
                { size: 2.2, texture: 'https://i.imgur.com/PofZgS0.jpg', dist: 34, speed: 0.005 }, // Yupiter qaz xətləri ilə
                { size: 0.7, texture: 'https://i.imgur.com/6Xw6f6B.jpg', dist: 42, speed: 0.003 }  // Pluton / Ekzoplanet
            ];

            planetData.forEach((data) => {
                const geometry = new THREE.SphereGeometry(data.size, 64, 64); // 64x64 hamar kürə quruluşu
                
                // Sadə rəng yerinə real şəkil teksturası tətbiq edirik
                const texture = textureLoader.load(data.texture);
                const material = new THREE.MeshStandardMaterial({
                    map: texture,
                    roughness: 0.8,
                    metalness: 0.1
                });
                
                const planet = new THREE.Mesh(geometry, material);
                
                planet.userData = {
                    distance: data.dist,
                    speed: data.speed,
                    angle: Math.random() * Math.PI * 2
                };
                
                scene.add(planet);
                planets.push(planet);
            });

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('touchmove', onTouchMove, { passive: true });
            document.addEventListener('mousemove', onMouseMove);
            
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            // Girişdən əvvəlki yavaş hərəkət
            if (!isActivated) {
                stars.rotation.y += 0.0001;
                planets.forEach((planet, index) => {
                    planet.position.x = Math.cos(index + Date.now() * 0.00003) * planet.userData.distance;
                    planet.position.z = Math.sin(index + Date.now() * 0.00003) * planet.userData.distance;
                    planet.rotation.y += 0.003;
                });
            } 
            // Düyməyə basdıqdan sonrakı sürətli kosmos fırlanması
            else {
                if (transitionProgress < 1) {
                    transitionProgress += 0.005;
                    camera.position.z = THREE.MathUtils.lerp(45, 28, transitionProgress);
                }

                stars.rotation.y += 0.0012;
                stars.rotation.x += 0.0003;

                planets.forEach(planet => {
                    planet.userData.angle += planet.userData.speed * 0.6;
                    planet.position.x = Math.cos(planet.userData.angle) * planet.userData.distance;
                    planet.position.z = Math.sin(planet.userData.angle) * planet.userData.distance;
                    planet.rotation.y += 0.015; // Planetin öz oxu ətrafında gerçək fırlanması
                });

                // Kameranın mausa/ekrana toxunuşa görə incə hərəkəti
                camera.position.x += (mouseX * 15 - camera.position.x) * 0.05;
                camera.position.y += (-mouseY * 15 - camera.position.y) * 0.05;
                camera.lookAt(scene.position);
            }

            renderer.render(scene, camera);
        }

        function startUniverse(event) {
            event.preventDefault();
            
            const music = document.getElementById('bgMusic');
            music.volume = 0.8;
            music.play().catch(err => console.log("Musiqi aktivləşmədi:", err));
            
            document.getElementById('loginBox').classList.add('hide');
            isActivated = true;
        }

        function onMouseMove(event) {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function onTouchMove(event) {
            if(event.touches.length > 0) {
                mouseX = (event.touches[0].clientX / window.innerWidth) * 2 - 1;
                mouseY = -(event.touches[0].clientY / window.innerHeight) * 2 + 1;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
</body>
</html>
