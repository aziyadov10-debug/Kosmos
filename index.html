<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Universe</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
}
</style>
</head>
<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.165.0/build/three.module.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
5000
);

camera.position.z = 10;

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// Stars

const starGeometry = new THREE.BufferGeometry();

const starCount = 25000;

const positions = [];

for(let i=0;i<starCount;i++){

positions.push(
(Math.random()-0.5)*3000,
(Math.random()-0.5)*3000,
(Math.random()-0.5)*3000
);

}

starGeometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(positions,3)
);

const starMaterial = new THREE.PointsMaterial({
size:1.2,
transparent:true
});

const stars = new THREE.Points(
starGeometry,
starMaterial
);

scene.add(stars);

// Galaxy Core

const galaxyGeometry = new THREE.BufferGeometry();

const galaxyPositions = [];

for(let i=0;i<10000;i++){

const radius = Math.random()*120;

const angle = radius * 0.4;

galaxyPositions.push(
Math.cos(angle)*radius,
(Math.random()-0.5)*15,
Math.sin(angle)*radius
);

}

galaxyGeometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(galaxyPositions,3)
);

const galaxyMaterial = new THREE.PointsMaterial({
size:1.5
});

const galaxy = new THREE.Points(
galaxyGeometry,
galaxyMaterial
);

scene.add(galaxy);

// Nebula

const nebulaGeo = new THREE.SphereGeometry(50,64,64);

const nebulaMat = new THREE.MeshBasicMaterial({
transparent:true,
opacity:0.04
});

const nebula = new THREE.Mesh(
nebulaGeo,
nebulaMat
);

scene.add(nebula);

// Mouse Movement

let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove",(e)=>{
mouseX = (e.clientX/window.innerWidth - 0.5);
mouseY = (e.clientY/window.innerHeight - 0.5);
});

// Animation

function animate(){

requestAnimationFrame(animate);

stars.rotation.y += 0.00015;
stars.rotation.x += 0.00005;

galaxy.rotation.y += 0.0008;

camera.position.x += (mouseX*10 - camera.position.x)*0.02;
camera.position.y += (-mouseY*10 - camera.position.y)*0.02;

camera.lookAt(scene.position);

renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script>

</body>
</html>
