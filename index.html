<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonsuz Kosmos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #03030c;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Glassmorphism Panel */
        .login-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            width: 85%;
            max-width: 360px;
            padding: 35px 25px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-container.hide {
            opacity: 0;
            visibility: hidden;
            transform: translate(-50%, -85%) scale(0.8);
        }

        .login-container h2 {
            color: #fff;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 2px;
            font-size: 1.4rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            outline: none;
            color: #fff;
            font-size: 15px;
            transition: 0.3s;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #1e40af, #6b21a8);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(107, 33, 168, 0.4);
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .submit-btn:hover {
            box-shadow: 0 6px 25px rgba(30, 64, 175, 0.6);
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.soundboard.com/media/audio/7b79da7c-5026-474a-a2b1-12c85f1cbf50.mp3" type="audio/mpeg">
        <source src="https://ia801602.us.archive.org/11/items/hans-zimmer-cornfield-chase/Hans%20Zimmer%20-%20Cornfield%20Chase.mp3" type="audio/mpeg">
    </audio>

    <div id="canvas-container"></div>

    <div class="login-container" id="loginBox">
        <h2>Kainata Giriş</h2>
        <form id="loginForm" onsubmit="startUniverse(event)">
            <div class="input-group">
                <input type="text" placeholder="Adınız" required>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Giriş Kodu" required>
            </div>
            <button type="submit" class="submit-btn">Kainatı Başlat</button>
        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, stars, planets = [];
        let isActivated = false;
        let transitionProgress = 0; 
        let mouseX = 0, mouseY = 0;

        function init() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 50;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // Çoxölçülü Kosmik İşıqlandırma
            const ambientLight = new THREE.AmbientLight(0x111122, 0.6);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 2.0);
            sunLight.position.set(20, 10, 20);
            scene.add(sunLight);

            // Əlavə rəngli kosmik işıq parıltısı (Realistik ab-hava üçün)
            const nebulaLight = new THREE.PointLight(0x7c3aed, 1.5, 100);
            nebulaLight.position.set(-15, -10, -10);
            scene.add(nebulaLight);

            // Zəngin Ulduz Fonu (Parıldayan effekt)
            const starGeo = new THREE.BufferGeometry();
            const starCount = 5000;
            const starPositions = new Float32Array(starCount * 3);

            for(let i=0; i < starCount * 3; i++) {
                starPositions[i] = (Math.random() - 0.5) * 600;
            }

            starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.35, transparent: true, opacity: 0.9 });
            stars = new THREE.Points(starGeo, starMaterial);
            scene.add(stars);

            // GENERASİYA OLUNMUŞ REALİSTİK PLANETLƏR (Şəkil istifadə etmədən möhtəşəm rəng keçidləri)
            const planetData = [
                { size: 0.9, color: 0xe5e7eb, emissive: 0x1f2937, roughness: 0.9, dist: 14, speed: 0.012 }, // Kraterli Ay tipli
                { size: 1.6, color: 0x2563eb, emissive: 0x1d4ed8, roughness: 0.4, dist: 22, speed: 0.009, hasAtmosphere: true }, // Okean planeti
                { size: 1.2, color: 0xdc2626, emissive: 0x991b1b, roughness: 0.8, dist: 30, speed: 0.007 }, // Qırmızı Mars tipli
                { size: 2.6, color: 0xd97706, emissive: 0xb45309, roughness: 0.6, dist: 40, speed: 0.005 }, // Nəhəng Yupiter tipli
                { size: 1.0, color: 0x0d9488, emissive: 0x115e59, roughness: 0.5, dist: 50, speed: 0.003 }  // Buzlu Neptun tipli
            ];

            planetData.forEach((data) => {
                // Səthi nahamar və real göstərmək üçün seqment sayını artırdıq (64x64)
                const geometry = new THREE.SphereGeometry(data.size, 64, 64);
                
                // İşıq və kölgəyə real reaksiya verən material quruluşu
                const material = new THREE.MeshStandardMaterial({
                    color: data.color,
                    emissive: data.emissive,
                    emissiveIntensity: 0.2,
                    roughness: data.roughness,
                    metalness: 0.1,
                    flatShading: false // Tamamilə hamar və yumşaq rəng keçidi
                });
                
                const planet = new THREE.Mesh(geometry, material);
                
                planet.userData = {
                    distance: data.dist,
                    speed: data.speed,
                    angle: Math.random() * Math.PI * 2
                };
                
                scene.add(planet);
                planets.push(planet);
            });

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('touchmove', onTouchMove, { passive: true });
            document.addEventListener('mousemove', onMouseMove);
            
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!isActivated) {
                stars.rotation.y += 0.0001;
                planets.forEach((planet, index) => {
                    planet.position.x = Math.cos(index + Date.now() * 0.00003) * planet.userData.distance;
                    planet.position.z = Math.sin(index + Date.now() * 0.00003) * planet.userData.distance;
                    planet.rotation.y += 0.003;
                });
            } else {
                // Girişdən sonra kameranın sürətlə kosmosun içinə doğru irələməsi (Möhtəşəm keçid)
                if (transitionProgress < 1) {
                    transitionProgress += 0.008;
                    camera.position.z = THREE.MathUtils.lerp(50, 32, transitionProgress);
                }

                // Göy üzünün (Ulduzların) fırlanması
                stars.rotation.y += 0.0015;
                stars.rotation.x += 0.0003;

                // Planetlərin orbit və öz oxları ətrafında real hərəkəti
                planets.forEach(planet => {
                    planet.userData.angle += planet.userData.speed * 0.7;
                    planet.position.x = Math.cos(planet.userData.angle) * planet.userData.distance;
                    planet.position.z = Math.sin(planet.userData.angle) * planet.userData.distance;
                    planet.rotation.y += 0.015; // Öz oxu ətrafında fırlanma
                });

                // Sensor və maus hərəkətinə görə kameranın yumşaq reaksiyası
                camera.position.x += (mouseX * 15 - camera.position.x) * 0.05;
                camera.position.y += (-mouseY * 15 - camera.position.y) * 0.05;
                camera.lookAt(scene.position);
            }

            renderer.render(scene, camera);
        }

        function startUniverse(event) {
            event.preventDefault();
            
            const music = document.getElementById('bgMusic');
            music.volume = 0.85;
            music.play().catch(err => console.log("Musiqi xətası:", err));
            
            document.getElementById('loginBox').classList.add('hide');
            isActivated = true;
        }

        function onMouseMove(event) {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function onTouchMove(event) {
            if(event.touches.length > 0) {
                mouseX = (event.touches[0].clientX / window.innerWidth) * 2 - 1;
                mouseY = -(event.touches[0].clientY / window.innerHeight) * 2 + 1;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
</body>
</html>
