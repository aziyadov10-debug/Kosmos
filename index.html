<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gecə Səmada Səyahət</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #020208;
        }

        /* Göy üzü və Mənzərə */
        #space-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Ön Plandakı Qara Siluet (Skamekada Oturan Adam və İti) */
        .silhouette-scene {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            height: 220px;
            z-index: 3;
            pointer-events: none;
            opacity: 0.4; /* Girişdən əvvəl yüngül görünür */
            transition: opacity 2s ease-in-out;
        }

        .active .silhouette-scene {
            opacity: 1; /* Girişdən sonra tam qara və net olur */
        }

        /* Glassmorphism Qeydiyyat Paneli */
        .login-container {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            width: 85%;
            max-width: 360px;
            padding: 35px 25px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-container.hide {
            opacity: 0;
            visibility: hidden;
            transform: translate(-50%, -90%) scale(0.8);
        }

        .login-container h2 {
            color: #fff;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 2px;
            font-size: 1.4rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            outline: none;
            color: #fff;
            font-size: 15px;
            transition: 0.3s;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #111827, #374151);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            letter-spacing: 1px;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.soundboard.com/media/audio/7b79da7c-5026-474a-a2b1-12c85f1cbf50.mp3" type="audio/mpeg">
    </audio>

    <div id="space-container">
        <canvas id="skyCanvas"></canvas>
    </div>

    <div class="silhouette-scene" id="silhouetteBox">
        <svg viewBox="0 0 500 220" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            <path d="M 0 190 Q 250 170 500 190 L 500 220 L 0 220 Z" fill="#030309"/>
            
            <path d="M 190 180 L 310 178 M 195 165 L 305 163 M 190 165 L 190 195 M 310 163 L 310 193 M 220 179 L 220 190 M 280 178 L 280 189" stroke="#030309" stroke-width="4" fill="none"/>
            <path d="M 195 150 L 195 165 M 305 148 L 305 163 M 195 152 L 305 150" stroke="#030309" stroke-width="3" fill="none"/>
            
            <path d="M 225 165 C 220 150, 225 135, 235 135 C 240 135, 245 140, 245 150 C 245 155, 250 160, 255 165 C 260 170, 250 180, 240 180 C 232 180, 228 175, 225 165 Z" fill="#030309"/>
            <circle cx="233" cy="124" r="7" fill="#030309"/>
            
            <path d="M 275 180 C 270 175, 270 165, 275 160 C 280 155, 285 160, 285 168 C 290 168, 295 172, 295 180 Z" fill="#030309"/>
            <path d="M 273 158 C 271 154, 275 150, 278 153 C 280 155, 277 158, 273 158 Z" fill="#030309"/>
        </svg>
    </div>

    <div class="login-container" id="loginBox">
        <h2>Kainata Giriş</h2>
        <form id="loginForm" onsubmit="startUniverse(event)">
            <div class="input-group">
                <input type="text" placeholder="Adınız" required>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Giriş Kodu" required>
            </div>
            <button type="submit" class="submit-btn">Kainatı Başlat</button>
        </form>
    </div>

    <script>
        const canvas = document.getElementById('skyCanvas');
        const ctx = canvas.getContext('2d');

        let stars = [];
        let meteors = [];
        let isActivated = false;
        let speedMultiplier = 1;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initStars();
        }

        // Realistik ulduzların yaradılması
        function initStars() {
            stars = [];
            const starCount = Math.floor((canvas.width * canvas.height) * 0.0015);
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height * 0.8, // Skamekadan yuxarıda olsunlar
                    size: Math.random() * 1.5,
                    opacity: Math.random(),
                    factor: Math.random() * 0.02 + 0.005
                });
            }
        }

        // Axan Ulduzlar (Meteoridlər) funksiyası
        function spawnMeteor() {
            if (!isActivated && Math.random() > 0.05) return; // Girişdən qabaq çox az axır
            if (meteors.length < 4) {
                meteors.push({
                    x: Math.random() * canvas.width * 0.8,
                    y: 0,
                    length: Math.random() * 80 + 40,
                    speed: Math.random() * 12 + 6,
                    thickness: Math.random() * 1.5 + 0.5,
                    opacity: 1
                });
            }
        }

        function draw() {
            // Dərin qaranlıq göy üzü qradiyenti
            let skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGradient.addColorStop(0, '#02020a');
            skyGradient.addColorStop(0.6, '#08071a');
            skyGradient.addColorStop(1, '#110e2e');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Ulduzların parıldama animasiyası və yavaş fırlanması
            ctx.fillStyle = "white";
            stars.forEach(star => {
                star.opacity += star.factor;
                if (star.opacity > 1 || star.opacity < 0) {
                    star.factor = -star.factor;
                }
                
                // Girişdən sonra ulduzlar çox az hərəkət edir (Real səmada olduğu kimi)
                if(isActivated) {
                    star.x += 0.02 * speedMultiplier;
                    if (star.x > canvas.width) star.x = 0;
                }

                ctx.globalAlpha = Math.max(0, Math.min(1, star.opacity));
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Gəlib keçən Meteoridlərin çəkilməsi
            meteors.forEach((m, index) => {
                ctx.strokeStyle = `rgba(255, 255, 255, ${m.opacity})`;
                ctx.lineWidth = m.thickness;
                ctx.beginPath();
                ctx.moveTo(m.x, m.y);
                ctx.lineTo(m.x + m.length, m.y + m.length * 0.6); // Diaqonal axma bucağı
                ctx.stroke();

                // Hərəkət təyini
                m.x += m.speed * speedMultiplier;
                m.y += m.speed * 0.6 * speedMultiplier;
                
                if (isActivated) m.opacity -= 0.015; // Keçdikcə itmək effekti

                if (m.y > canvas.height || m.x > canvas.width || m.opacity <= 0) {
                    meteors.splice(index, 1);
                }
            });

            // Təsadüfi vaxtlarda yeni meteor çıxarmaq
            if (Math.random() < 0.03) spawnMeteor();

            requestAnimationFrame(draw);
        }

        function startUniverse(event) {
            event.preventDefault();
            
            const music = document.getElementById('bgMusic');
            music.volume = 0.9;
            music.play().catch(err => console.log("Musiqi xətası:", err));
            
            // Paneli gizlət
            document.getElementById('loginBox').classList.add('hide');
            // Silueti tam canlandır
            document.body.classList.add('active');
            
            isActivated = true;
            speedMultiplier = 1.5; // Girişdən sonra səmada hərəkət sürətlənir
        }

        window.addEventListener('resize', resizeCanvas);
        window.onload = () => {
            resizeCanvas();
            draw();
        };
    </script>
</body>
</html>
